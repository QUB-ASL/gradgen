name: Python Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e . numpy sympy

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Generate demo crates
        run: |
          python demos/codegen/main.py
          python demos/custom_function/main.py
          python demos/multi_function/main.py
          python demos/vjp/main.py
          python demos/composed_function/main.py --repeats 5

      - name: Run demo runners
        run: |
          cargo run --manifest-path demos/codegen/runner/Cargo.toml
          cargo run --manifest-path demos/custom_function/runner/Cargo.toml
          cargo run --manifest-path demos/multi_function/runner/Cargo.toml
          cargo run --manifest-path demos/vjp/runner/Cargo.toml
          cargo run --manifest-path demos/composed_function/runner/Cargo.toml

      - name: Run clippy for demo runners
        run: |
          cargo clippy --quiet --manifest-path demos/codegen/runner/Cargo.toml
          cargo clippy --quiet --manifest-path demos/custom_function/runner/Cargo.toml
          cargo clippy --quiet --manifest-path demos/multi_function/runner/Cargo.toml
          cargo clippy --quiet --manifest-path demos/vjp/runner/Cargo.toml
          cargo clippy --quiet --manifest-path demos/composed_function/runner/Cargo.toml
